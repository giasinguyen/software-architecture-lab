spring:
  application:
    name: demo
  datasource:
    url: ${DB_URL:jdbc:mariadb://localhost:3306/plugin_cms}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MariaDBDialect

server:
  port: ${SERVER_PORT:8080}
