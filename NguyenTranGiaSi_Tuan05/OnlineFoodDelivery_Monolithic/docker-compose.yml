services:
  postgres:
    image: postgres:16-alpine
    container_name: food_delivery_db
    environment:
      POSTGRES_DB: food_delivery
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - food_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d food_delivery"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    container_name: food_delivery_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/food_delivery
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - food_network
    restart: on-failure

  frontend:
    build:
      context: ./FrontEnd
      dockerfile: Dockerfile
    container_name: food_delivery_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - food_network

volumes:
  postgres_data:

networks:
  food_network:
    driver: bridge
