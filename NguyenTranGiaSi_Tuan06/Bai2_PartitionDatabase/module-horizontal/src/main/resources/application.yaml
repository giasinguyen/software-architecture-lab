server:
  port: 8081

spring:
  application:
    name: module-horizontal
  datasource:
    url: jdbc:mariadb://localhost:3306/horizontal_db
    username: root
    password: root
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
