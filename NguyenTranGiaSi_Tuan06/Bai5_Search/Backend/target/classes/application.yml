spring:
  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:3306/search_demo
    username: ${DB_USER:root}
    password: ${DB_PASS:sapassword}
    driver-class-name: org.mariadb.jdbc.Driver
  jpa:
    hibernate:
      # "update" tự tạo bảng nếu chưa có (cho dev); SP được tạo bởi DatabaseInitializer
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect
        format_sql: true

server:
  port: 8080
