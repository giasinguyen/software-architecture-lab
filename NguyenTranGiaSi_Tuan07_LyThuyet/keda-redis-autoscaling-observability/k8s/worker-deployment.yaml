apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: keda-demo
spec:
  replicas: 0
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      containers:
        - name: worker
          image: worker-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8080
          env:
            - name: REDIS_HOST
              value: redis.keda-demo.svc.cluster.local
            - name: REDIS_PORT
              value: "6379"
            - name: QUEUE_NAME
              value: job-queue
            - name: PROCESSING_DELAY_MS
              value: "2000"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 300m
              memory: 384Mi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: worker-service
  namespace: keda-demo
spec:
  selector:
    app: worker-service
  ports:
    - port: 8080
      targetPort: 8080
